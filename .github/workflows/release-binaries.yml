name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and publish'
        required: true
        default: 'v1.6.0'

permissions:
  actions: read
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_TOKEN: ${{ github.token }}
  WINDOWS_7ZIP_RELEASE_API: https://api.github.com/repos/ip7z/7zip/releases/latest
  WINDOWS_JXL_URL: https://github.com/libjxl/libjxl/releases/latest/download/jxl-x64-windows-static.zip
  WINDOWS_WEBP_URL: https://storage.googleapis.com/downloads.webmproject.org/releases/webp/libwebp-1.6.0-windows-x64.zip
  FB2CNG_RELEASE_API: https://api.github.com/repos/rupor-github/fb2cng/releases/latest

jobs:
  release-smoke-tests:
    name: Release smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run release smoke tests
        run: npm run test:release

  build:
    name: Build ${{ matrix.label }}
    needs: release-smoke-tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x64
            target: linux
            build_script: build:linux
            fbc_asset: fbc-linux-amd64.zip
          - os: ubuntu-latest
            label: Linux arm64
            target: linux-arm64
            build_script: build:linux-arm64
            fbc_asset: fbc-linux-arm64.zip
          - os: windows-latest
            label: Windows x64
            target: win
            build_script: build:win
            fbc_asset: fbc-windows-amd64.zip
          - os: macos-latest
            label: macOS x64
            target: macos
            build_script: build:macos
            fbc_asset: fbc-darwin-amd64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: npm run ${{ matrix.build_script }}

      - name: Bundle Windows cover tools
        if: matrix.target == 'win'
        shell: pwsh
        run: |
          $binDir = Join-Path $PWD 'dist/win/bin'
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          $githubHeaders = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; 'X-GitHub-Api-Version' = '2022-11-28' }
          $sevenZipRelease = Invoke-RestMethod -Uri $env:WINDOWS_7ZIP_RELEASE_API -Headers $githubHeaders
          $sevenZipAsset = $sevenZipRelease.assets |
            Where-Object { $_.name -like '7z*-extra.7z' } |
            Select-Object -First 1
          $sevenZipBootstrapAsset = $sevenZipRelease.assets |
            Where-Object { $_.name -eq '7zr.exe' } |
            Select-Object -First 1
          if (-not $sevenZipAsset) {
            throw 'Unable to find 7-Zip extra package in the latest release'
          }
          if (-not $sevenZipBootstrapAsset) {
            throw 'Unable to find 7-Zip bootstrap extractor in the latest release'
          }

          $sevenZipArchive = Join-Path $env:RUNNER_TEMP $sevenZipAsset.name
          $sevenZipBootstrap = Join-Path $env:RUNNER_TEMP '7zr-bootstrap.exe'
          $sevenZipExtract = Join-Path $env:RUNNER_TEMP '7zip-extra'
          if (Test-Path $sevenZipExtract) {
            Remove-Item $sevenZipExtract -Recurse -Force
          }

          # Use 7zr only as a temporary extractor for the official extra package;
          # the Windows release payload gets the full 7za.exe with PPMD support.
          Invoke-WebRequest -Uri $sevenZipAsset.browser_download_url -OutFile $sevenZipArchive
          Invoke-WebRequest -Uri $sevenZipBootstrapAsset.browser_download_url -OutFile $sevenZipBootstrap
          & $sevenZipBootstrap x $sevenZipArchive "-o$sevenZipExtract" -y
          $sevenZipSource = Get-ChildItem -Path $sevenZipExtract -Recurse -File -Filter '7za.exe' | Select-Object -First 1
          if (-not $sevenZipSource) {
            throw 'Unable to find 7za.exe in the 7-Zip extra package'
          }
          Copy-Item $sevenZipSource.FullName -Destination (Join-Path $binDir '7za.exe') -Force

          $jxlArchive = Join-Path $env:RUNNER_TEMP 'jxl-x64-windows-static.zip'
          $jxlExtract = Join-Path $env:RUNNER_TEMP 'jxl-x64-windows-static'
          if (Test-Path $jxlExtract) {
            Remove-Item $jxlExtract -Recurse -Force
          }

          Invoke-WebRequest -Uri $env:WINDOWS_JXL_URL -OutFile $jxlArchive
          Expand-Archive -Path $jxlArchive -DestinationPath $jxlExtract -Force

          Get-ChildItem -Path $jxlExtract -Recurse -File |
            Where-Object { $_.Extension -in @('.exe', '.dll') } |
            ForEach-Object {
              Copy-Item $_.FullName -Destination (Join-Path $binDir $_.Name) -Force
            }

          $webpArchive = Join-Path $env:RUNNER_TEMP 'libwebp-windows-x64.zip'
          $webpExtract = Join-Path $env:RUNNER_TEMP 'libwebp-windows-x64'
          if (Test-Path $webpExtract) {
            Remove-Item $webpExtract -Recurse -Force
          }

          Invoke-WebRequest -Uri $env:WINDOWS_WEBP_URL -OutFile $webpArchive
          Expand-Archive -Path $webpArchive -DestinationPath $webpExtract -Force

          Get-ChildItem -Path $webpExtract -Recurse -File |
            Where-Object { $_.Extension -in @('.exe', '.dll') } |
            ForEach-Object {
              Copy-Item $_.FullName -Destination (Join-Path $binDir $_.Name) -Force
            }

      - name: Bundle fb2cng converter
        shell: pwsh
        run: |
          $binDir = Join-Path $PWD "dist/${{ matrix.target }}/bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          $githubHeaders = @{ Authorization = "Bearer $env:GITHUB_TOKEN"; 'X-GitHub-Api-Version' = '2022-11-28' }
          $fb2cngRelease = Invoke-RestMethod -Uri $env:FB2CNG_RELEASE_API -Headers $githubHeaders
          $fb2cngAsset = $fb2cngRelease.assets |
            Where-Object { $_.name -eq '${{ matrix.fbc_asset }}' } |
            Select-Object -First 1
          if (-not $fb2cngAsset) {
            throw 'Unable to find fb2cng asset ${{ matrix.fbc_asset }} in the latest release'
          }

          $fbcArchive = Join-Path $env:RUNNER_TEMP $fb2cngAsset.name
          $fbcExtract = Join-Path $env:RUNNER_TEMP "fb2cng-${{ matrix.target }}"
          if (Test-Path $fbcExtract) {
            Remove-Item $fbcExtract -Recurse -Force
          }

          Invoke-WebRequest -Uri $fb2cngAsset.browser_download_url -OutFile $fbcArchive
          Expand-Archive -Path $fbcArchive -DestinationPath $fbcExtract -Force

          $fbcFileName = if ('${{ matrix.target }}' -eq 'win') { 'fbc.exe' } else { 'fbc' }
          $fbcSource = Get-ChildItem -Path $fbcExtract -Recurse -File |
            Where-Object { $_.Name -eq $fbcFileName } |
            Select-Object -First 1
          if (-not $fbcSource) {
            throw "Unable to find $fbcFileName in $($fb2cngAsset.name)"
          }

          $fbcTarget = Join-Path $binDir $fbcFileName
          Copy-Item $fbcSource.FullName -Destination $fbcTarget -Force
          if ('${{ matrix.target }}' -ne 'win') {
            chmod +x $fbcTarget
          }

      - name: Archive release payload
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $srcDir = Join-Path $PWD ("dist/{0}" -f "${{ matrix.target }}")
          if (-not (Test-Path $srcDir)) {
            throw "Build output directory not found: $srcDir"
          }
          $outDir = Join-Path $PWD "dist/release"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $archiveName = "inpx-web-$version-${{ matrix.target }}.zip"
          $archivePath = Join-Path $outDir $archiveName
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path (Join-Path $srcDir '*') -DestinationPath $archivePath -Force
          "ARCHIVE_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh run download ${{ github.run_id }} --repo ${{ github.repository }} --dir release-assets

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name, '-rc') }}
          files: release-assets/**/*.zip
          overwrite_files: true


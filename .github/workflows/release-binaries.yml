name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and publish'
        required: true
        default: 'v1.6.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux x64
            target: linux
            build_script: build:linux
          - os: ubuntu-latest
            label: Linux arm64
            target: linux-arm64
            build_script: build:linux-arm64
          - os: windows-latest
            label: Windows x64
            target: win
            build_script: build:win
          - os: macos-latest
            label: macOS x64
            target: macos
            build_script: build:macos

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: npm run ${{ matrix.build_script }}

      - name: Archive release payload
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $srcDir = Join-Path $PWD ("dist/{0}" -f "${{ matrix.target }}")
          if (-not (Test-Path $srcDir)) {
            throw "Build output directory not found: $srcDir"
          }
          $outDir = Join-Path $PWD "dist/release"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $archiveName = "inpx-web-$version-${{ matrix.target }}.zip"
          $archivePath = Join-Path $outDir $archiveName
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path (Join-Path $srcDir '*') -DestinationPath $archivePath -Force
          "ARCHIVE_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          files: release-assets/**/*.zip
          overwrite_files: true

